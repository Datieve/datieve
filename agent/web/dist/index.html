<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Datieve</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body class="text-sm">

<div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-xs rounded-2xl border border-line bg-panel p-6 shadow-sm">
    <h1 class="text-base font-bold mb-1" id="login-title">Datieve</h1>
    <p class="text-xs text-muted mb-4" id="login-subtitle">Enter your access code</p>
    <form id="login-form">
      <input id="login-code" type="password" autocomplete="off" placeholder="Access code"
             class="w-full rounded-lg border border-line bg-bg px-3 py-2 text-sm mb-3 outline-none focus:border-brand" />
      <button type="submit"
              class="w-full rounded-lg bg-brand-solid text-on-brand text-sm font-medium py-2 hover:bg-brand-hover transition-colors">
        Sign in
      </button>
    </form>
    <p id="login-error" class="text-xs text-danger mt-3 hidden"></p>
    <p id="login-setup-warning" class="text-xs text-warn mt-3 hidden">
      This agent hasn't finished setup yet. Use the Datieve desktop app to configure it first.
    </p>
  </div>
</div>

<div id="app-shell" class="hidden min-h-screen flex flex-col">
  <header class="flex items-center gap-3 border-b border-line bg-panel px-4 py-2">
    <button id="home-btn" class="text-sm font-semibold shrink-0 hover:text-brand transition-colors">Datieve</button>
    <nav id="breadcrumbs" class="flex items-center gap-1 text-xs text-muted overflow-x-auto whitespace-nowrap"></nav>
    <div class="flex-1"></div>
    <div class="relative">
      <input id="search-input" type="search" placeholder="Search files…"
             class="w-56 sm:w-64 rounded-lg border border-line bg-bg px-3 py-1.5 text-xs outline-none focus:border-brand" />
    </div>
    <button id="filters-toggle"
            class="text-xs text-muted border border-line rounded-lg px-2 py-1.5 hover:border-line-strong transition-colors">
      Filters
    </button>
    <span id="whoami" class="text-xs text-muted hidden sm:inline"></span>
    <button id="logout-btn" class="text-xs text-danger hover:underline">Log out</button>
  </header>

  <div id="filters-panel" class="hidden border-b border-line bg-panel-soft px-4 py-2 flex flex-wrap items-end gap-3 text-xs">
    <label class="flex flex-col gap-1">
      <span class="text-muted">Min size (MB)</span>
      <input id="filter-size-min" type="number" min="0" class="w-24 rounded-lg border border-line bg-panel px-2 py-1 outline-none focus:border-brand" />
    </label>
    <label class="flex flex-col gap-1">
      <span class="text-muted">Max size (MB)</span>
      <input id="filter-size-max" type="number" min="0" class="w-24 rounded-lg border border-line bg-panel px-2 py-1 outline-none focus:border-brand" />
    </label>
    <label class="flex flex-col gap-1">
      <span class="text-muted">Modified after</span>
      <input id="filter-modified-after" type="date" class="rounded-lg border border-line bg-panel px-2 py-1 outline-none focus:border-brand" />
    </label>
    <label class="flex flex-col gap-1">
      <span class="text-muted">Modified before</span>
      <input id="filter-modified-before" type="date" class="rounded-lg border border-line bg-panel px-2 py-1 outline-none focus:border-brand" />
    </label>
    <label class="flex items-center gap-1.5 pb-1.5">
      <input id="filter-include-deleted" type="checkbox" class="rounded border-line" />
      <span class="text-muted">Include deleted</span>
    </label>
    <button id="filters-apply" class="rounded-lg bg-brand-solid text-on-brand px-3 py-1.5 font-medium hover:bg-brand-hover transition-colors">Apply</button>
    <button id="filters-clear" class="text-muted hover:text-ink transition-colors">Clear</button>
  </div>

  <div class="flex flex-1 min-h-0">
    <aside class="w-52 shrink-0 border-r border-line bg-panel-soft p-3 overflow-y-auto hidden md:block">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-xs font-semibold text-muted uppercase tracking-wide">Bookmarks</h2>
        <button id="bookmark-here-btn"
                class="text-xs text-brand hover:text-brand-hover transition-colors disabled:opacity-40 disabled:pointer-events-none"
                title="Bookmark current folder">+ Add</button>
      </div>
      <ul id="bookmarks-list" class="space-y-1"></ul>
      <p id="bookmarks-empty" class="text-xs text-faint mt-2 hidden">No bookmarks yet.</p>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 min-w-0">
      <div id="status-line" class="text-xs text-muted mb-2"></div>
      <table class="w-full text-xs border-collapse" id="entries-table">
        <thead class="text-left text-muted border-b border-line">
          <tr>
            <th class="py-1.5 pr-2 font-medium">Name</th>
            <th class="py-1.5 pr-2 font-medium w-24">Size</th>
            <th class="py-1.5 pr-2 font-medium w-40">Modified</th>
            <th class="py-1.5 font-medium w-20"></th>
          </tr>
        </thead>
        <tbody id="entries-body"></tbody>
      </table>
      <button id="load-more-btn" class="hidden mt-3 text-xs text-brand hover:text-brand-hover transition-colors">Load more</button>
    </main>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
